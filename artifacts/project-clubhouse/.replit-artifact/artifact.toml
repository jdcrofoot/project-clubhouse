kind = "web"
previewPath = "/"
title = "Project Clubhouse"
version = "1.0.0"
id = "artifacts/project-clubhouse"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20564

[services.development]
run = "pnpm --filter @workspace/project-clubhouse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-clubhouse", "run", "build" ]
serve = "static"
publicDir = "artifacts/project-clubhouse/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20564"
BASE_PATH = "/"
